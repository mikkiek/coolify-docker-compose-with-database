services:
  app:
    image: node:20-slim
    container_name: app
    working_dir: /app
    command: sh -c "npm install pg && node server.js"
    volumes:
      - ./server.js:/app/server.js:ro
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: visits
      POSTGRES_USER: visits_user
      POSTGRES_PASSWORD: visits_password
      POSTGRES_SSL: "false"
    depends_on:
      - postgres
    restart: always
    labels:
      - "coolify.managed=true"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: visits
      POSTGRES_USER: visits_user
      POSTGRES_PASSWORD: visits_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
